version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./guardian_shield.db
      - JWT_SECRET=change-this-to-a-random-secret-in-production
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - backend-data:/app/data

  # ML engine runs on the host (needs raw network access)
  # Start with: cd ml && python -m ml.main

volumes:
  backend-data:
